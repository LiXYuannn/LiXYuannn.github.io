---
layout: archive
---
<!DOCTYPE html>
<html>
<head>
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/archive.css' | relative_url }}">
</head>
<body>
  <div class="archive-page">
    
    <div class="archive-header">
      <img src="{{ '/assets/images/avatar.jpg' | relative_url }}" class="archive-avatar">
      <h1 class="archive-title">作品集</h1> 
    </div>
    {% include navigation.html %}
    <div class="archive-container">
      <div class="archive-column">
        <div class="archive-card">
          <h2>分类归档</h2>
          <ul>
            {% for category in site.categories %}
            <li><a href="/category/{{ category[0] }}">{{ category[0] }}</a></li>
            {% endfor %}
          </ul>
        </div>
      </div>
      
      <div class="archive-column">
        <div class="archive-card">
          <h2>时间归档</h2>
          <ul>
            {% for post in site.posts %}
            <li>
              <a href="{{ post.url }}">{{ post.date | date: "%Y-%m-%d" }} - {{ post.title }}</a>
            </li>
            {% endfor %}
          </ul>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
